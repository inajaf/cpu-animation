name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Universal binary: runs natively on Apple Silicon and Intel Macs.
      - run: npm run tauri build -- --target universal-apple-darwin

      - name: Stage artifacts
        # Versioned names for humans; stable names so the Homebrew cask can
        # point at releases/latest/download/ and never need updating.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p dist
          cp "$BUNDLE/dmg/Pulsebar_${VERSION}_universal.dmg" "dist/Pulsebar_${VERSION}_universal.dmg"
          ditto -c -k --keepParent "$BUNDLE/macos/Pulsebar.app" "dist/Pulsebar_${VERSION}_universal.zip"
          cp "dist/Pulsebar_${VERSION}_universal.dmg" "dist/Pulsebar_universal.dmg"
          cp "dist/Pulsebar_${VERSION}_universal.zip" "dist/Pulsebar_universal.zip"
          (cd dist && shasum -a 256 * > SHA256SUMS.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "Pulsebar $GITHUB_REF_NAME" \
            --generate-notes
